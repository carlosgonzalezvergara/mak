<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>M.A.K. - Systemic Functional Linguistics Diagram Tool</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    
    <link rel="icon" type="image/png" href="favicon.png".png">
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&family=Source+Sans+3:wght@300;400;500;600;700&family=DM+Serif+Display&display=swap');

        :root {
            --parchment: #FAF6F1;
            --parchment-deep: #F3EDE4;
            --cream: #FFFFFF;
            --ink: #2C2420;
            --ink-light: #5C534D;
            --ink-muted: #8C837B;
            --rule: #D4C9BC;
            --rule-light: #E8E0D6;
            --accent: #8B3A3A;
            --accent-hover: #6E2D2D;
            --accent-soft: #F5EDED;
            --accent-border: #D4A3A3;
            --node-bg: #FFFEFA;
            --node-shadow: 0 2px 8px rgba(44,36,32,0.08), 0 1px 2px rgba(44,36,32,0.06);
            --node-shadow-hover: 0 4px 16px rgba(44,36,32,0.12), 0 2px 4px rgba(44,36,32,0.08);
            --label-bg: #F9F4EE;
            --label-bg-filled: #F0E8DF;
            --label-border: #D4C9BC;
            --label-border-filled: #B8A99A;
            --label-text: #4A3F37;
            --mak-text-scale: 1;
            --row-h: calc((11px * var(--mak-text-scale, 1)) + (4px * var(--mak-text-scale, 1) * 2) + 2px);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Source Sans 3', 'Segoe UI', sans-serif;
            background-color: var(--parchment);
            min-height: 100vh;
            color: var(--ink);
        }

        /* ===========================================
           MAIN LAYOUT — PANEL + CANVAS SPLIT
           =========================================== */
        .app-layout {
            display: grid;
            grid-template-columns: 210px 1fr;
            min-height: 100vh;
        }

        /* ===========================================
           LEFT PANEL
           =========================================== */
        .side-panel {
            background: var(--parchment-deep);
            border-right: 1px solid var(--rule);
            padding: 18px 14px;
            display: flex;
            flex-direction: column;
            gap: 16px;
            overflow-y: auto;
        }

        .panel-logo {
            font-family: 'DM Serif Display', serif;
            font-size: 1.4rem;
            letter-spacing: 0.1em;
            color: var(--ink);
            text-align: center;
            padding-bottom: 12px;
            border-bottom: 1px solid var(--rule);
        }
        .panel-logo small {
            display: block;
            font-family: 'Source Sans 3', sans-serif;
            font-size: 0.45rem;
            letter-spacing: 0.16em;
            text-transform: uppercase;
            color: var(--ink-muted);
            margin-top: 3px;
            font-weight: 500;
        }

        .panel-section-title {
            font-size: 9px;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: var(--ink-muted);
            font-weight: 600;
            margin-bottom: 5px;
        }

        .panel-input {
            width: 100%;
            padding: 9px 10px;
            border: 1px solid var(--rule);
            border-radius: 6px;
            font-size: 13px;
            font-family: 'Source Sans 3', sans-serif;
            background: var(--cream);
            color: var(--ink);
            outline: none;
            transition: border-color 0.2s;
        }
        .panel-input:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 2px rgba(139,58,58,0.1);
        }
        .panel-input::placeholder {
            color: var(--ink-muted);
            font-style: italic;
        }

        .panel-btn-row {
            display: flex;
            gap: 6px;
        }

        .panel-btn {
            flex: 1;
            padding: 8px 0;
            border: 1px solid var(--rule);
            background: var(--cream);
            border-radius: 6px;
            font-size: 14px; /* Aumentado */
            font-family: 'Source Sans 3', sans-serif;
            font-weight: 600;
            color: var(--ink-light);
            cursor: pointer;
            text-align: center;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            transition: all 0.15s;
        }
        .panel-btn:hover:not(.primary) {
            background: #ffffff;
            border-color: var(--accent-border);
            color: var(--accent);
            box-shadow: 0 4px 10px rgba(44, 36, 32, 0.06);
        }
        .panel-btn:disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }
        .panel-btn.primary {
            background: var(--accent);
            color: #fff;
            border-color: var(--accent);
        }
        .panel-btn.primary:hover {
            background: var(--accent-hover);
            box-shadow: 0 4px 10px rgba(139, 58, 58, 0.25);
        }

        .panel-tools {
            display: flex;
            flex-direction: column;
            gap: 3px;
        }

        .panel-tool-btn {
            padding: 7px 10px;
            border: none;
            background: transparent;
            border-radius: 6px;
            font-size: 14px; /* Aumentado */
            font-family: 'Source Sans 3', sans-serif;
            color: var(--ink-light);
            cursor: pointer;
            text-align: left;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: all 0.15s;
        }
        .panel-tool-btn:hover {
            background: rgba(139,58,58,0.06);
            color: var(--ink);
        }
        .panel-tool-btn:disabled {
            opacity: 0.35;
            cursor: not-allowed;
        }
        .panel-tool-btn:disabled:hover {
            background: transparent;
            color: var(--ink-light);
        }

        .panel-tool-icon {
            display: flex; align-items: center; justify-content: center;
            flex-shrink: 0;
            color: currentColor;
        }

        .panel-spacer { flex: 1; }

        .panel-footer {
            padding-top: 12px;
            border-top: 1px solid var(--rule);
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        /* Autosave in panel */
        .panel-autosave {
            font-size: 11px;
            color: var(--ink-muted);
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 4px 0;
            min-height: 20px;
        }
        .panel-autosave-dot {
            width: 6px; height: 6px; border-radius: 50%;
            background: #7C9A6E; display: inline-block;
        }
        .panel-autosave-dot.saving {
            background: #C4963C;
            animation: pulse 1s ease-in-out infinite;
        }
        @keyframes pulse {
            0%,100% { transform: scale(1); opacity: .7; }
            50% { transform: scale(1.35); opacity: 1; }
        }
        .autosave-ellipsis { display: inline-flex; margin-left: 1px; letter-spacing: 1px; }
        .autosave-ellipsis span {
            display: inline-block; width: 5px; text-align: center;
            opacity: 0.2; animation: ellipsis 1s infinite;
        }
        .autosave-ellipsis span:nth-child(2) { animation-delay: 0.15s; }
        .autosave-ellipsis span:nth-child(3) { animation-delay: 0.30s; }
        @keyframes ellipsis {
            0%,60%,100% { opacity: 0.2; }
            30% { opacity: 1; }
        }

        /* Quick guide in panel */
        .panel-guide-toggle {
            width: 100%;
            padding: 10px 12px; /* Un poco más alto para darle presencia */
            border: 1px solid var(--rule); /* Le damos un borde para que parezca un panel interactivo */
            background: var(--cream); /* Fondo blanco/crema para que resalte sobre el fondo del panel lateral */
            border-radius: 6px;
            font-size: 14px; 
            font-family: 'Source Sans 3', sans-serif;
            font-weight: 600; /* Texto en seminegrita */
            color: var(--ink); /* Color oscuro en lugar de gris apagado */
            cursor: pointer;
            text-align: left;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: all 0.2s;
            box-shadow: 0 1px 3px rgba(44,36,32,0.04); /* Una sombra levísima para darle volumen */
            position: relative;
            z-index: 2;
        }
        .panel-guide-toggle:hover {
            background: #ffffff;
            border-color: var(--accent-border); /* Guiño al color principal al pasar el ratón */
            color: var(--accent);
            box-shadow: 0 4px 10px rgba(44, 36, 32, 0.06);
        }
        .panel-guide-toggle .panel-tool-icon {
            color: var(--accent); /* Pone el icono de "info" en rojo corporativo */
        }
        /* Estilo especial cuando el panel de abajo está visible */
        .panel-guide-toggle.open-style {
            border-bottom: none; /* Quitamos el borde por completo, no solo el color */
            border-bottom-left-radius: 0;
            border-bottom-right-radius: 0;
            padding-bottom: 11px; /* Sumamos 1px al padding para compensar el borde perdido y que el texto no salte */
            box-shadow: none !important; /* Eliminamos la sombra para que no manche el panel inferior */
            z-index: 1; /* Ya no forzamos que se superponga */
        }
        .panel-guide-toggle.open-style:hover {
            border-color: var(--rule); 
        }
        .panel-guide-content {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.3s ease, border-color 0.3s ease, box-shadow 0.3s ease, background-color 0.3s ease;
            background-color: transparent;
            border: 1px solid transparent;
            border-top: none; /* Como el de arriba no tiene borde abajo, encajan perfecto */
            border-radius: 0 0 6px 6px;
            margin-top: 0; /* Eliminamos el truco del margen negativo */
            box-shadow: none;
        }
        .panel-guide-content.open {
            max-height: 1200px;
            background-color: var(--cream);
            border-color: var(--rule);
            box-shadow: 0 4px 10px rgba(44, 36, 32, 0.06);
        }
        .panel-guide-inner {
            padding: 12px 12px 18px 12px;
            font-size: 12px;
            line-height: 1.6;
            color: var(--ink-light);
        }
        .panel-guide-inner strong { color: var(--ink); }
        .panel-guide-inner code {
            background: var(--rule-light);
            padding: 1px 5px;
            border-radius: 3px;
            font-size: 11px;
            font-family: 'SF Mono', Consolas, monospace;
            color: var(--ink);
        }
        .guide-section { margin-bottom: 10px; }
        .guide-section-title {
            font-weight: 700;
            color: var(--ink);
            font-size: 12px;
            margin-bottom: 3px;
        }
        .guide-section ul { padding-left: 14px; margin: 0; }
        .guide-section li { margin-bottom: 3px; }
        .guide-section li::marker { color: var(--accent); }
        .guide-section:last-child {
            margin-bottom: 0;
        }

        /* Zoom controls in panel */
            .panel-zoom-controls {
                display: flex; 
                align-items: center; 
                justify-content: space-between;
                background: var(--parchment); /* Fondo para que parezca un área contenedora */
                border: 1px solid var(--rule-light);
                border-radius: 20px; /* Forma de píldora */
                padding: 4px;
                box-shadow: inset 0 1px 3px rgba(44, 36, 32, 0.05); /* Efecto ligeramente hundido */
            }

            .zoom-btn {
                width: 28px; 
                height: 28px;
                border: 1px solid var(--rule-light); 
                background: var(--cream);
                border-radius: 50%; /* Botones completamente redondos */
                font-size: 16px; 
                font-weight: 600;
                color: var(--ink-light);
                cursor: pointer;
                display: flex; 
                align-items: center; 
                justify-content: center;
                transition: all 0.2s ease;
                box-shadow: 0 1px 2px rgba(44, 36, 32, 0.06); /* Elevación sutil */
            }

            .zoom-btn:hover:not(:disabled) { 
                background: #ffffff; 
                color: var(--accent);
                border-color: var(--accent-border);
                transform: scale(1.05); /* Pequeño crecimiento al pasar el cursor */
            }

            .zoom-btn:disabled { 
                opacity: 0.4; 
                cursor: not-allowed; 
                box-shadow: none;
                background: transparent;
                border-color: transparent;
            }

            .zoom-indicator {
                flex: 1; 
                height: 28px;
                display: flex; 
                align-items: center; 
                justify-content: center;
                font-size: 13px; 
                font-weight: 600; 
                color: var(--ink-muted);
                cursor: pointer; 
                user-select: none;
                transition: color 0.15s;
            }

            .zoom-indicator:hover { 
                color: var(--accent); 
            }


        /* ===========================================
           CANVAS (right side)
           =========================================== */
        .canvas-area {
            background: var(--cream);
            position: relative;
            overflow: auto;
            min-height: 100vh;
        }

        .tree-container {
            padding: 40px;
            position: relative;
            overflow: auto;
            max-width: 100%;
            min-height: calc(100vh - 20px);
        }

        .tree-wrapper {
            display: flex;
            justify-content: flex-start;
            padding: 20px 0;
            position: relative;
            width: fit-content;
            min-width: 100%;
            margin: 0 auto;
        }

        .canvas-placeholder {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            color: var(--ink-muted);
        }
        .canvas-placeholder .big {
            font-family: 'DM Serif Display', serif;
            font-size: 1.3rem;
            color: var(--rule);
            margin-bottom: 6px;
        }
        .canvas-placeholder p {
            font-size: 14px;
            font-style: italic;
        }

        .zoom-container { transform-origin: top left; }

        /* ===========================================
           TREE STRUCTURE
           =========================================== */
        .children-container {
            display: flex;
            justify-content: center;
            align-items: flex-start;
            position: relative;
        }
        .child-branch {
            display: flex;
            flex-direction: column;
            align-items: center;
            position: relative;
            padding-top: calc(var(--row-h) / 2);
        }
        .child-branch::before,
        .child-branch::after {
            content: "";
            position: absolute; top: 0;
            width: 50%; height: calc(var(--row-h) / 2);
            border-top: 1.5px solid var(--ink-muted);
        }
        .child-branch::before { right: 50%; }
        .child-branch::after { left: 50%; }
        .child-branch:first-child::before { border-top: none; }
        .child-branch:last-child::after { border-top: none; }

        .v-line-stem {
            width: 1.5px; height: calc(var(--row-h) / 2);
            background-color: var(--ink-muted);
            position: absolute; top: 0; left: 50%;
            transform: translateX(-50%);
        }

        /* ===========================================
           NODES — CARDS WITH ELEVATION
           =========================================== */
        .node-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            position: relative;
            margin: 0 5px;
            width: fit-content;
        }

        .connector-v {
            width: 1.5px;
            background-color: var(--ink-muted);
            margin: 0 auto;
        }

        .node-box {
            height: var(--row-h);
            width: 94px;
            min-width: 94px;
            padding: 0 calc(8px * var(--mak-text-scale, 1));
            border: 1px solid var(--label-border-filled);
            border-radius: 4px;
            background-color: var(--label-bg-filled);
            font-size: calc(11px * var(--mak-text-scale, 1));
            font-family: 'Source Sans 3', sans-serif;
            font-style: italic;
            color: var(--label-text);
            text-align: center;
            position: relative;
            box-shadow: none;
            transition: box-shadow 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            box-sizing: border-box;
            overflow: visible;
        }
        .node-box.root-node {
            width: auto;
            min-width: 94px;
            max-width: none;
        }
        .node-text-ellipsis {
            display: block;
            width: 100%;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        .node-box.can-divide {
            border-color: var(--accent-border);
            background-color: var(--accent-soft);
            cursor: pointer;
        }
        .node-box.can-divide:hover {
            box-shadow: none;
        }
        .node-box.terminal-node {
            background-color: #fff;
            color: #6e1b1b;
            font-weight: 600;
        }

        /* ===========================================
           LABELS — MULTI-ROW
           =========================================== */
        .labels-stack {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0px;
            position: relative;
            padding-bottom: 0;
        }

        .label-connector-v {
            width: 1.5px;
            height: var(--row-h);
            background-color: var(--ink-muted);
            margin: 0 auto;
            flex-shrink: 0;
        }

        .label-row {
            position: relative;
            display: inline-flex;
            align-items: center;
            gap: 2px;
            margin: 0;
        }

        .label-input {
            width: 94px;
            text-align: center;
            border: 1px dashed var(--rule);
            border-radius: 4px;
            height: var(--row-h);
            padding: 0 calc(4px * var(--mak-text-scale, 1));
            font-size: calc(11px * var(--mak-text-scale, 1));
            line-height: var(--row-h);
            background: var(--label-bg);
            color: var(--ink-muted);
            font-family: 'Source Sans 3', sans-serif;
            box-sizing: border-box;
        }
        .label-input.has-value {
            background-color: var(--label-bg-filled);
            border: 1px solid var(--label-border-filled);
            color: var(--label-text);
        }

        .label-display {
            min-width: 94px;
            text-align: center;
            border: 1px dashed var(--rule);
            border-radius: 4px;
            height: var(--row-h);
            padding: 0 calc(4px * var(--mak-text-scale, 1));
            font-size: calc(11px * var(--mak-text-scale, 1));
            background: var(--label-bg);
            color: var(--ink-muted);
            font-family: 'Source Sans 3', sans-serif;
            cursor: text;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            box-sizing: border-box;
            overflow: hidden;
            white-space: nowrap;
            text-overflow: ellipsis;
        }
        .label-display.has-value {
            background-color: var(--label-bg-filled);
            border: 1px solid var(--label-border-filled);
            color: var(--label-text);
        }
        .label-display:hover { border-color: var(--accent-border); }

        .label-wrap {
            position: relative;
            display: inline-flex;
            align-items: center;
            gap: 2px;
        }

        .label-add-btn {
            position: absolute;
            bottom: -16px; left: 50%;
            transform: translateX(-50%);
            width: 18px; height: 14px;
            border-radius: 3px;
            border: 1px solid var(--rule);
            background: var(--parchment-deep);
            color: var(--accent);
            font-size: 12px; font-weight: bold;
            cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            opacity: 0; pointer-events: none;
            transition: all 0.15s;
            padding: 0; z-index: 5;
        }
        .labels-stack:hover .label-add-btn { opacity: 1; pointer-events: auto; }
        .label-add-btn:hover {
            background: var(--accent-soft);
            border-color: var(--accent-border);
        }

        .label-remove-btn {
            position: absolute;
            right: -16px; top: 50%;
            transform: translateY(-50%);
            width: 14px; height: 14px;
            border-radius: 50%;
            border: 1px solid #dcc;
            background: #fff; color: #b44;
            font-size: 9px; cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            opacity: 0; pointer-events: none;
            transition: opacity 0.15s;
            padding: 0; line-height: 1; z-index: 5;
        }
        .label-row:hover .label-remove-btn { opacity: 1; pointer-events: auto; }
        .label-remove-btn:hover { background: #fef2f2; border-color: #c44; }

        /* ===========================================
           PUENTES INVISIBLES PARA HOVER DE ETIQUETAS
           =========================================== */
        .labels-stack:hover::after {
            content: '';
            position: absolute;
            bottom: -20px; /* Cubre el espacio vacío hacia el botón + */
            left: 0;
            right: 0;
            height: 20px;
            z-index: 4;
        }

        .label-row:hover::after {
            content: '';
            position: absolute;
            top: -10px;
            bottom: -10px;
            right: -20px; /* Cubre el espacio vacío hacia el botón x */
            width: 20px;
            z-index: 4;
        }

        /* ===========================================
           NODE ACTION BUTTONS
           =========================================== */
        .clear-text-btn {
            position: absolute; top: -10px; right: -10px;
            background: #c44; color: white; border: none; border-radius: 50%;
            width: 18px; height: 18px; font-size: 10px;
            cursor: pointer; display: none;
            align-items: center; justify-content: center;
        }
        .node-box:hover .clear-text-btn { display: flex; }

        .add-node-btn {
            position: absolute; 
            bottom: -10px; 
            left: 50%;
            transform: translateX(-50%);
            background: var(--accent); 
            color: white; 
            border: none; 
    
    /* Cambiamos de círculo a forma de píldora */
            border-radius: 10px; 
            width: 28px; /* Más ancho para que quepa el "+1" cómodamente */
            height: 18px; 
            font-size: 12px;
            font-weight: 600; /* Un poco más de peso para que el "+" resalte */
    
            cursor: pointer; 
            display: none;
            align-items: center; 
            justify-content: center;
        }
        .node-box:hover .add-node-btn { display: flex; }

        .consolidate-btn {
            position: absolute; top: -10px; left: -10px;
            background: #C4963C; color: white; border: none; border-radius: 50%;
            width: 18px; height: 18px; font-size: 10px;
            cursor: pointer; display: none;
            align-items: center; justify-content: center;
        }
        .node-box:hover .consolidate-btn { display: flex; }

        /* ===========================================
           EDIT NODE TEXT
           =========================================== */
        .edit-text-btn {
            position: absolute; bottom: -10px; right: -10px;
            background: #4A8B71; color: white; border: none; border-radius: 50%;
            width: 18px; height: 18px; font-size: 10px;
            cursor: pointer; display: none;
            align-items: center; justify-content: center;
            z-index: 10;
        }
        .node-box:hover .edit-text-btn { display: flex; }

        .node-box-row {
            position: relative;
            display: inline-flex;
            align-items: center;
        }
        .node-revert-btn {
            position: absolute; left: 100%; top: 50%;
            transform: translate(8px, -50%);
            z-index: 50; pointer-events: auto;
        }

        /* ===========================================

        .new-diagram-modal {

        /* Estilos para el panel IPA en New Diagram */
        .ipa-toggle-btn {

        .ipa-panel {

        .ipa-char-btn:hover { background: var(--accent); color: white; border-color: var(--accent); transform: scale(1.12); }
        .ipa-char-btn:active { transform: scale(0.95); }

        /* ===========================================
           CLITIC SUGGESTION MODAL
           =========================================== */
        .clitic-list { list-style: none; padding: 0; margin: 0 0 14px; }
        .clitic-item {
            display: flex; align-items: center; gap: 10px;

        .clitic-item:last-child { margin-bottom: 0; }

        }

        .clitic-suggestion { color: var(--accent); font-weight: 600; }

        .contraction-original {
            font-weight: 600; color: var(--ink); font-size: 14px;

        }
        .contraction-select {
            flex: 1; padding: 7px 10px; border: 1px solid var(--rule);

        /* ===========================================
           MODALS
           =========================================== */
        .pos-overlay {
            position: fixed; inset: 0;
            background: rgba(44,36,32,0.35);
            display: flex; align-items: center; justify-content: center;

        .pos-modal {
            width: min(520px, calc(100vw - 32px));
            background: var(--cream);

        .pos-title { font-weight: 700; color: var(--ink); margin: 0 0 6px; font-family: 'DM Serif Display', serif; }
        .pos-sub { margin: 0 0 12px; color: var(--ink-light); font-size: 13px; }

        .pos-actions { display: flex; justify-content: flex-end; gap: 10px; margin-top: 14px; }

        .btn { padding: 9px 20px; border: 1px solid transparent; border-radius: 6px; font-size: 14px; font-weight: 600; font-family: 'Source Sans 3', sans-serif; cursor: pointer; transition: all 0.2s; display: inline-flex; align-items: center; gap: 8px; line-height: 1; user-select: none; }
        .btn:active { transform: translateY(1px); }

        .btn-primary:hover { background-color: var(--accent-hover); }
        .btn-outline { background-color: var(--cream); border-color: var(--rule); color: var(--ink); }
        .btn-outline:hover { background-color: var(--parchment-deep); border-color: var(--ink-muted); }

        /* ===========================================
           FOOTER (inside panel)

        .footer a { color: var(--ink-light); text-decoration: none; }

        .footer img { opacity: 0.6; transition: opacity 0.2s; display: block; margin: 6px auto 0; height: 20px; }
        .footer img:hover { opacity: 1; }

        /* ===========================================
           RESPONSIVE
           =========================================== */
        /* ===========================================
           LABEL DROPDOWN PILLS
           =========================================== */
        .label-dropdown {
            position: fixed;
            background: white;

            font-family: 'Source Sans 3', sans-serif;

        .label-pill:hover { background: var(--accent); color: white; border-color: var(--accent); }

        /* ===========================================
           LABELS MODAL
           =========================================== */
        .labels-modal-overlay {

        .labels-modal {
            background: var(--cream);
            border: 1px solid var(--rule-light);

            box-shadow: 0 20px 40px rgba(44,36,32,0.18);

            width: min(460px, calc(100vw - 32px));
            display: flex; flex-direction: column; gap: 12px;
        }
        .labels-modal-title {
            font-family: 'DM Serif Display', serif;
            font-size: 18px; font-weight: 700;
            color: var(--ink); margin: 0;
        }
        .labels-modal-sub {
            font-size: 13px; color: var(--ink-light); margin: 0;
        }
        .labels-modal-textarea {
            width: 100%; height: 130px;
            padding: 10px 12px;
            border: 1px solid var(--rule);
            border-radius: 6px;
            font-size: 13px;
            font-family: 'Source Sans 3', sans-serif;
            background: white; color: var(--ink);
            outline: none; resize: vertical;
            transition: border-color 0.2s;
        }
        .labels-modal-textarea:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 2px rgba(139,58,58,0.1);
        }
        .labels-modal-preview {
            display: flex; flex-wrap: wrap; gap: 5px;
            min-height: 28px; padding: 6px;
            background: var(--parchment);
            border: 1px solid var(--rule-light);
            border-radius: 6px;

        .labels-modal-preview-empty {
            font-size: 12px; color: var(--ink-muted);
            font-style: italic; align-self: center;
        }
        .labels-modal-actions {
            display: flex; justify-content: space-between; align-items: center; gap: 10px;
        }
        .labels-modal-file-btn {
            padding: 7px 12px;

            font-size: 13px; font-family: 'Source Sans 3', sans-serif;

            transition: all 0.15s;

        .labels-modal-count {
            font-size: 12px; color: var(--ink-muted);

        @media (max-width: 600px) {
            .app-layout {
                grid-template-columns: 1fr;
                grid-template-rows: auto 1fr;
            }
            .side-panel {
                border-right: none;

                gap: 10px;
                flex-direction: row;
                flex-wrap: wrap;

            .panel-logo { padding-bottom: 0; border-bottom: none; }

            .panel-spacer { display: none; }
            .panel-guide-toggle { display: none; }
            .panel-guide-content { display: none; }

</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useRef, useEffect, useCallback, useMemo } = React;

        const debounce = (func, delay) => {
            let timeout;
            return (...args) => { clearTimeout(timeout); timeout = setTimeout(() => func(...args), delay); };
        };

        const IPA_CATEGORIES = [
            { title: 'Vowels', chars: 'i y ɨ ʉ ɯ u ɪ ʏ ʊ e ø ɘ ɵ ɤ o ə ɛ œ ɜ ɞ ʌ ɔ æ ɐ a ɶ ɑ ɒ'.split(' ') },
            { title: 'Plosives', chars: 'p b t d ʈ ɖ c ɟ k ɡ q ɢ ʔ'.split(' ') },
            { title: 'Nasals', chars: 'm ɱ n ɳ ɲ ŋ ɴ'.split(' ') },
            { title: 'Fricatives', chars: 'ɸ β f v θ ð s z ʃ ʒ ʂ ʐ ɕ ʑ ç ʝ x ɣ χ ʁ ħ ʕ ʜ ʢ h ɦ'.split(' ') },
            { title: 'Lateral Fricatives', chars: 'ɬ ɮ'.split(' ') },
            { title: 'Approximants', chars: 'ʋ ɹ ɻ j ɰ'.split(' ') },
            { title: 'Lateral Approximants', chars: 'l ɭ ʎ ʟ'.split(' ') },
            { title: 'Trills & Taps', chars: 'ʙ r ʀ ⱱ ɾ ɽ ɺ'.split(' ') },
            { title: 'Affricates', chars: 't͡s d͡z t͡ʃ d͡ʒ t͡ɕ d͡ʑ ʈ͡ʂ ɖ͡ʐ'.split(' ') },
            { title: 'Clicks', chars: 'ʘ ǀ ǃ ǂ ǁ'.split(' ') },
            { title: 'Implosives & Ejectives', chars: 'ɓ ɗ ʄ ɠ ʛ ʼ'.split(' ') },
            { title: 'Co-articulated', chars: 'ʍ w ɥ ɧ'.split(' ') },
            { title: 'Suprasegmentals', chars: 'ˈ ˌ ː ˑ ˘ ‿ | ‖ . ̆'.split(' ') },
            { title: 'Diacritics – Voicing & Airstream', chars: '̥ ̬ ̤ ̰ ̼ ̚'.split(' ') },
            { title: 'Diacritics – Place', chars: '̪ ̺ ̻ ̟ ̠ ̘ ̙'.split(' ') },
            { title: 'Diacritics – Manner', chars: '̝ ̞ ̹ ̜ ̈ ̽ ̩ ̯ ˞ ̃ ̴'.split(' ') },
            { title: 'Diacritics – Secondary', chars: 'ʰ ʷ ʲ ˠ ˤ ⁿ ˡ ˀ'.split(' ') },
            { title: 'Tones – Level (Chao)', chars: '˥ ˦ ˧ ˨ ˩'.split(' ') },
            { title: 'Tones – Diacritics', chars: '̋ ́ ̄ ̀ ̏'.split(' ') },
            { title: 'Tones – Contour', chars: '̌ ̂ ᷄ ᷅ ᷈ ↗ ↘'.split(' ') },
            { title: 'Brackets & Delimiters', chars: '/ [ ] ⟨ ⟩ { }'.split(' ') },
        ];

        const computeTextScale = (zoomLevel) => {
            const z = zoomLevel / 100;
            if (z >= 1) return 1;
            return Math.pow(z, 0.24);
        };

        const SyntaxTreeBuilder = () => {
            // ===========================================
            // ESTADO
            // ===========================================
            const [sentence, setSentence] = useState('');
            const [tree, setTree] = useState(null);
            const [divisionMode, setDivisionMode] = useState(null);
            const [selectedCuts, setSelectedCuts] = useState([]);
            const [posPicker, setPosPicker] = useState(null);
            const [cliticPending, setCliticPending] = useState(null);
            const [contractionPending, setContractionPending] = useState(null);
            const [nodeTextPending, setNodeTextPending] = useState(null);
            const [nodeTextValue, setNodeTextValue] = useState('');

            // Historial Undo/Redo
            const [history, setHistory] = useState([]);
            const [historyIndex, setHistoryIndex] = useState(-1);
            const isUndoRedo = useRef(false);

            // Referencias
            const fileInputRef = useRef(null);
            const treeContainerRef = useRef(null);
            const zoomContainerRef = useRef(null);

            // Zoom
            const [zoomLevel, setZoomLevel] = useState(100);
            const ZOOM_MIN = 60;
            const ZOOM_MAX = 200;
            const ZOOM_STEP = 20;

            // Auto-guardado
            const [isSaving, setIsSaving] = useState(false);
            const [lastSaved, setLastSaved] = useState(null);
            const formatTimeAgo = (dateObj) => {
                if (!dateObj) return '';
                const diffMs = Date.now() - dateObj.getTime();
                const diffSec = Math.max(0, Math.floor(diffMs / 1000));
                if (diffSec < 10) return 'just now';
                if (diffSec < 60) return 'a few seconds ago';
                const diffMin = Math.floor(diffSec / 60);
                if (diffMin < 60) return `${diffMin} min ago`;
                const diffHr = Math.floor(diffMin / 60);
                return `${diffHr} h ago`;
            };

            // Escala tipográfica
            const textScale = useMemo(() => computeTextScale(zoomLevel), [zoomLevel]);

            const makeZoomHandlers = (setter) => ({
                zoomIn:    () => setter(prev => Math.min(prev + ZOOM_STEP, ZOOM_MAX)),
                zoomOut:   () => setter(prev => Math.max(prev - ZOOM_STEP, ZOOM_MIN)),
                zoomReset: () => setter(100),
            });
            const { zoomIn, zoomOut, zoomReset } = useMemo(() => makeZoomHandlers(setZoomLevel), []);

            // Etiqueta en edición
            const [editingLabel, setEditingLabel] = useState(null);
            const [editingNode, setEditingNode] = useState(null);

            // ===========================================
            // CATÁLOGO DE ETIQUETAS DE USUARIO
            // ===========================================
            const [userLabels, setUserLabels] = useState(() => {
                try {
                    const saved = localStorage.getItem('mak-labels');
                    return saved ? JSON.parse(saved) : [];
                } catch { return []; }
            });
            const [showLabelsModal, setShowLabelsModal] = useState(false);
            const [labelsTextDraft, setLabelsTextDraft] = useState('');
            const labelsFileInputRef = useRef(null);

            const saveLabelsToFile = () => {
                const toSave = showLabelsModal ? parseLabels(labelsTextDraft) : userLabels;
                if (toSave.length === 0) return;
                const content = toSave.join('\n');
                const blob = new Blob([content], { type: 'text/plain' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = 'mak-labels.txt';
                a.click();
                URL.revokeObjectURL(url);
            };

            const handleLoadLabelsFromPanel = (e) => {
                const file = e.target.files[0];
                if (!file) return;
                const reader = new FileReader();
                reader.onload = (ev) => {
                    const text = ev.target.result.trim();
                    if (!text) return;
                    setLabelsTextDraft(text);
                };
                reader.readAsText(file);
                e.target.value = '';
            };

            // Dropdown de pills
            const [labelDropdown, setLabelDropdown] = useState(null); // { key, x, y }
            const labelDropdownRef = useRef(null);

            const parseLabels = (text) =>
                text.split(/[\n,]+/).map(s => s.trim()).filter(Boolean);

            const openLabelsModal = () => {
                setLabelsTextDraft(userLabels.join(', '));
                setShowLabelsModal(true);
            };

            const confirmLabels = () => {
                const parsed = parseLabels(labelsTextDraft);
                setUserLabels(parsed);
                try { localStorage.setItem('mak-labels', JSON.stringify(parsed)); } catch {}
                setShowLabelsModal(false);
            };

            const clearLabels = () => {
                setUserLabels([]);
                try { localStorage.removeItem('mak-labels'); } catch {}
                setShowLabelsModal(false);
            };

            const handleLabelsFile = (e) => {
                const file = e.target.files[0];
                if (!file) return;
                const reader = new FileReader();
                reader.onload = (ev) => {
                    setLabelsTextDraft(prev => {
                        const existing = prev.trim();
                        const incoming = ev.target.result;
                        return existing ? existing + ', ' + incoming : incoming;
                    });
                };
                reader.readAsText(file);
                e.target.value = '';
            };

            // Cerrar dropdown al hacer clic fuera
            useEffect(() => {
                if (!labelDropdown) return;
                const handler = (e) => {
                    if (labelDropdownRef.current && !labelDropdownRef.current.contains(e.target)) {
                        setLabelDropdown(null);
                    }
                };
                document.addEventListener('mousedown', handler);
                return () => document.removeEventListener('mousedown', handler);
            }, [labelDropdown]);

            // ===========================================
            // UTILIDADES
            // ===========================================
            const getFileName = (extension) => {
                const words = sentence.trim().split(/\s+/).slice(0, 5).join('_');
                const ext = extension === 'json' ? 'mak' : extension;
                return `${words}.${ext}`;
            };

            const normalizeSentence = (text) => {
                return text.trim()
                    // === SPANISH: contractions & fused pronouns ===
                    .replace(/\bdel\b/gi, 'de el')
                    .replace(/\bal\b/gi, 'a el')
                    .replace(/\bconmigo\b/gi, 'con migo')
                    .replace(/\bcontigo\b/gi, 'con tigo')
                    .replace(/\bconsigo\b/gi, 'con sigo')
                    // === ENGLISH: normalize curly apostrophes ===
                    .replace(/['']/g, "'")
                    // Irregular negative contractions (must come first)
                    .replace(/\bwon't\b/gi, 'will not')
                    .replace(/\bcan't\b/gi, 'can not')
                    .replace(/\bshan't\b/gi, 'shall not')
                    .replace(/\bain't\b/gi, 'am not')
                    // Regular negative contractions: don't, doesn't, didn't, isn't, aren't, etc.
                    .replace(/n't\b/gi, ' not')
                    // Unambiguous verb contractions
                    .replace(/\b(I|you|we|they|he|she|it|who|what|that|there|here)'ll\b/gi, '$1 will')
                    .replace(/\b(I|you|we|they|he|she|it|who|what|that|there|here)'ve\b/gi, '$1 have')
                    .replace(/\b(you|we|they|who|what|that|there|here)'re\b/gi, '$1 are')
                    .replace(/\bI'm\b/gi, 'I am')
                    .replace(/\blet's\b/gi, 'let us')
                    .replace(/\bwanna\b/gi, 'want to');
                    // Note: 's and 'd are ambiguous and handled interactively
            };

            const createEmptyTree = (text) => ({
                id: 'root',
                text: normalizeSentence(text),
                labels: [''],
                children: null,
                isNucleus: false,
                isConsolidated: false
            });

            // ===========================================
            // DETECCIÓN DE CLÍTICOS
            // ===========================================
            const CLITIC_LIST = ['nos', 'les', 'los', 'las', 'me', 'te', 'se', 'le', 'lo', 'la', 'os'];
            const SHORT_IMPERATIVE_STEMS = new Set([
                'di', 'da', 've', 'haz', 'pon', 'sal', 'ten', 'ven', 'id', 'sé', 'se', 'oíd', 'ved', 'oye', 'oid'
            ]);
            const CLITIC_EXCLUSIONS = new Set([
                'modelo', 'modelos', 'consuelo', 'consuelos', 'anzuelo', 'anzuelos',
                'pañuelo', 'pañuelos', 'abuelo', 'abuelos',
                'cielo', 'cielos', 'hielo', 'hielos', 'vuelo', 'vuelos',
                'suelo', 'suelos', 'duelo', 'duelos', 'pelo', 'pelos',
                'aquellos', 'aquellas', 'ellos', 'ellas',
                'estilo', 'estilos', 'siglo', 'siglos', 'título', 'títulos',
                'ejemplo', 'ejemplos', 'ángeles', 'tales',
            ]);

            const stripAccents = (str) => str.normalize('NFD').replace(/[\u0300-\u036f]/g, '');

            const extractClitics = (word) => {
                let remaining = word.toLowerCase();
                const clitics = [];
                const MAX_CLITICS = 3;

                for (let i = 0; i < MAX_CLITICS; i++) {
                    let matched = false;
                    for (const cl of CLITIC_LIST) {
                        if (remaining.endsWith(cl) && remaining.length > cl.length) {
                            clitics.unshift(cl);
                            remaining = remaining.slice(0, -cl.length);
                            matched = true;
                            break;
                        }
                    }
                    if (!matched) break;
                }

                if (clitics.length > 0 && remaining.length >= 2) {
                    const originalStem = word.slice(0, remaining.length);
                    return { stem: remaining, clitics, suggestion: originalStem + ' ' + clitics.join(' ') };
                }
                return null;
            };

            const detectCliticCandidates = (text) => {
                const words = text.trim().split(/\s+/);
                const candidates = [];
                const PUNCT_RE = /^([¡¿"'«(]*)(.+?)([!?.,;:…"'»)"']*)$/;

                for (let i = 0; i < words.length; i++) {
                    const word = words[i];
                    const match = word.match(PUNCT_RE);
                    if (!match) continue;
                    const [, puncBefore, core, puncAfter] = match;

                    if (CLITIC_EXCLUSIONS.has(core.toLowerCase())) continue;

                    const result = extractClitics(core);
                    if (!result) continue;

                    const stem = result.stem;
                    const stemClean = stripAccents(stem);

                    const shouldFlag =
                        stemClean.endsWith('r') ||
                        stemClean.endsWith('ndo') ||
                        stemClean.endsWith('d') ||
                        /[áéíóú]/.test(core) ||
                        SHORT_IMPERATIVE_STEMS.has(stemClean);

                    if (shouldFlag) {
                        const suggestion = puncBefore + result.suggestion + puncAfter;
                        candidates.push({
                            index: i,
                            original: word,
                            suggestion,
                            checked: true
                        });
                    }
                }

                return candidates;
            };

            const applyCliticSeparations = (text, candidates) => {
                const words = text.trim().split(/\s+/);
                const checkedByIndex = {};
                candidates.forEach(c => {
                    if (c.checked) {
                        const separated = c.suggestion.trim().split(/\s+/);
                        checkedByIndex[c.index] = separated;
                    }
                });
                const result = [];
                for (let i = 0; i < words.length; i++) {
                    if (checkedByIndex[i]) {
                        result.push(...checkedByIndex[i]);
                    } else {
                        result.push(words[i]);
                    }
                }
                return result.join(' ');
            };

            // ===========================================
            // ENGLISH CONTRACTION DISAMBIGUATION ('s / 'd)
            // ===========================================
            const CONTRACTION_PUNCT_RE = /^([("'¿¡]*)(.+?)([!?.,;:…"')"']*)$/;

            const detectAmbiguousContractions = (text) => {
                const normalized = text.replace(/['']/g, "'");
                const words = normalized.trim().split(/\s+/);
                const candidates = [];

                for (let i = 0; i < words.length; i++) {
                    const word = words[i];
                    const match = word.match(CONTRACTION_PUNCT_RE);
                    if (!match) continue;
                    const [, puncBefore, core, puncAfter] = match;
                    const lower = core.toLowerCase();

                    // Skip let's (handled automatically by normalizeSentence)
                    if (lower === "let's") continue;

                    if (/'s$/i.test(core)) {
                        const base = core.slice(0, -2);
                        candidates.push({
                            index: i,
                            original: word,
                            core,
                            base,
                            puncBefore,
                            puncAfter,
                            type: 's',
                            expansion: 'is',
                            options: [
                                { value: 'is', label: `${base} is` },
                                { value: 'has', label: `${base} has` },
                                { value: 'possessive', label: `${core} (possessive — no change)` }
                            ]
                        });
                    } else if (/'d$/i.test(core)) {
                        const base = core.slice(0, -2);
                        candidates.push({
                            index: i,
                            original: word,
                            core,
                            base,
                            puncBefore,
                            puncAfter,
                            type: 'd',
                            expansion: 'would',
                            options: [
                                { value: 'would', label: `${base} would` },
                                { value: 'had', label: `${base} had` }
                            ]
                        });
                    }
                }

                return candidates;
            };

            const applyContractionExpansions = (text, candidates) => {
                const normalized = text.replace(/['']/g, "'");
                const words = normalized.trim().split(/\s+/);
                const sorted = [...candidates].sort((a, b) => b.index - a.index);
                for (const c of sorted) {
                    if (c.expansion === 'possessive') {
                        words[c.index] = c.puncBefore + c.core + c.puncAfter;
                    } else {
                        const expanded = c.base + ' ' + c.expansion;
                        words[c.index] = c.puncBefore + expanded + c.puncAfter;
                    }
                }
                return words.join(' ');
            };

            const makeNewNode = (text = '') => ({
                id: `added-${Date.now()}-${Math.random().toString(16).slice(2)}`,
                text,
                labels: ['', ''],
                children: null,
                isNucleus: false,
                isInserted: true,
                isConsolidated: false
            });

            const updateNode = (node, id, updates) => {
                if (node.id === id) return { ...node, ...updates };
                if (node.children) {
                    return { ...node, children: node.children.map(c => updateNode(c, id, updates)) };
                }
                return node;
            };

            const findNodeById = (n, id) => {
                if (!n) return null;
                if (n.id === id) return n;
                if (n.children) {
                    for (const c of n.children) {
                        const r = findNodeById(c, id);
                        if (r) return r;
                    }
                }
                return null;
            };

            const shorten = (s, n = 18) => {
                const t = (s || '').trim();
                if (!t) return '∅';
                return t.length > n ? t.slice(0, n - 1) + '…' : t;
            };

            const buildPosLabel = (i, siblings) => {
                const n = siblings.length;
                if (n === 0) return 'Only position';
                if (i === 1) return 'At the beginning';
                if (i === n + 1) return 'At the end';
                const left = shorten(siblings[i - 2]);
                const right = shorten(siblings[i - 1]);
                return `Between "${left}" and "${right}"`;
            };

            // ===========================================
            // FORMATO DE TEXTO EN ETIQUETAS
            // ===========================================
            const formatLabelText = (text) => {
                if (!text) return null;
                const parts = [];
                let remaining = text;
                let key = 0;
                const patterns = [
                    { regex: /\*\*([^*]+)\*\*/, style: { fontWeight: 'bold' } },
                    { regex: /\*([^*]+)\*/, style: { fontStyle: 'italic' } },
                    { regex: /__([^_]+)__/, style: { fontSize: '0.75em', verticalAlign: 'super' } },
                    { regex: /_([^_]+)_/, style: { fontSize: '0.75em', verticalAlign: 'sub' } }
                ];
                while (remaining.length > 0) {
                    let earliestMatch = null;
                    let earliestIndex = remaining.length;
                    let matchedPattern = null;
                    for (const pattern of patterns) {
                        const match = remaining.match(pattern.regex);
                        if (match && match.index < earliestIndex) {
                            earliestMatch = match;
                            earliestIndex = match.index;
                            matchedPattern = pattern;
                        }
                    }
                    if (earliestMatch && matchedPattern) {
                        if (earliestIndex > 0) parts.push(<span key={key++}>{remaining.substring(0, earliestIndex)}</span>);
                        parts.push(<span key={key++} style={matchedPattern.style}>{earliestMatch[1]}</span>);
                        remaining = remaining.substring(earliestIndex + earliestMatch[0].length);
                    } else {
                        parts.push(<span key={key++}>{remaining}</span>);
                        break;
                    }
                }
                return parts.length > 0 ? parts : text;
            };

            const applyFormatToSpan = (span, text) => {
                if (!text) { span.textContent = ''; return; }
                span.innerHTML = '';
                let remaining = text;
                const patterns = [
                    { regex: /\*\*([^*]+)\*\*/, tag: 'strong', style: '' },
                    { regex: /\*([^*]+)\*/, tag: 'em', style: '' },
                    { regex: /__([^_]+)__/, tag: 'sup', style: 'font-size: 0.75em;' },
                    { regex: /_([^_]+)_/, tag: 'sub', style: 'font-size: 0.75em;' }
                ];
                while (remaining.length > 0) {
                    let earliestMatch = null;
                    let earliestIndex = remaining.length;
                    let matchedPattern = null;
                    for (const pattern of patterns) {
                        const match = remaining.match(pattern.regex);
                        if (match && match.index < earliestIndex) {
                            earliestMatch = match;
                            earliestIndex = match.index;
                            matchedPattern = pattern;
                        }
                    }
                    if (earliestMatch && matchedPattern) {
                        if (earliestIndex > 0) span.appendChild(document.createTextNode(remaining.substring(0, earliestIndex)));
                        const el = document.createElement(matchedPattern.tag);
                        if (matchedPattern.style) el.style.cssText = matchedPattern.style;
                        el.textContent = earliestMatch[1];
                        span.appendChild(el);
                        remaining = remaining.substring(earliestIndex + earliestMatch[0].length);
                    } else {
                        span.appendChild(document.createTextNode(remaining));
                        break;
                    }
                }
            };

            // ===========================================
            // HISTORIAL UNDO/REDO
            // ===========================================
            useEffect(() => {
                if (tree && !isUndoRedo.current) {
                    setHistory(prev => {
                        const newHistory = prev.slice(0, historyIndex + 1);
                        newHistory.push(JSON.stringify(tree));
                        if (newHistory.length > 50) newHistory.shift();
                        return newHistory;
                    });
                    setHistoryIndex(prev => Math.min(prev + 1, 49));
                }
                isUndoRedo.current = false;
            }, [tree]);

            const canUndo = historyIndex > 0;
            const canRedo = historyIndex < history.length - 1;

            const handleUndo = useCallback(() => {
                if (canUndo) {
                    isUndoRedo.current = true;
                    setHistoryIndex(prev => prev - 1);
                    setTree(JSON.parse(history[historyIndex - 1]));
                }
            }, [canUndo, history, historyIndex]);

            const handleRedo = useCallback(() => {
                if (canRedo) {
                    isUndoRedo.current = true;
                    setHistoryIndex(prev => prev + 1);
                    setTree(JSON.parse(history[historyIndex + 1]));
                }
            }, [canRedo, history, historyIndex]);

            // ===========================================
            // GUARDAR
            // ===========================================
            const handleSaveJSON = useCallback(() => {
                if (!tree) return;
                const blob = new Blob([JSON.stringify({ sentence, tree }, null, 2)], { type: 'application/json' });
                const a = document.createElement('a');
                a.href = URL.createObjectURL(blob);
                a.download = getFileName('json');
                a.click();
                localStorage.removeItem('mak-autosave');
                setLastSaved(null);
            }, [tree, sentence]);

            // ===========================================
            // AUTO-GUARDADO
            // ===========================================
            const performAutoSave = useCallback(() => {
                if (!tree || isUndoRedo.current) return;
                setIsSaving(true);
                const data = { sentence, tree, divisionMode, selectedCuts, timestamp: new Date().toISOString(), version: '1.0' };
                try {
                    localStorage.setItem('mak-autosave', JSON.stringify(data));
                    setLastSaved(new Date());
                    setTimeout(() => setIsSaving(false), 500);
                } catch (err) {
                    console.error('Error auto-saving:', err);
                    setIsSaving(false);
                }
            }, [sentence, tree, divisionMode, selectedCuts]);

            const autoSaveDebounced = useRef(null);
            if (!autoSaveDebounced.current) {
                autoSaveDebounced.current = debounce((saveFn) => saveFn(), 3000);
            }

            useEffect(() => {
                if (tree && !isUndoRedo.current) {
                    autoSaveDebounced.current(performAutoSave);
                }
            }, [sentence, tree, divisionMode, selectedCuts, performAutoSave]);

            // Restore on mount
            useEffect(() => {
                const saved = localStorage.getItem('mak-autosave');
                if (!saved) return;
                try {
                    const data = JSON.parse(saved);
                    const savedDate = new Date(data.timestamp);
                    const minutesAgo = Math.round((Date.now() - savedDate.getTime()) / 60000);
                    const message = minutesAgo < 1
                        ? 'Unsaved work found.\n\nDo you want to continue where you left off?'
                        : `Unsaved work found from ${minutesAgo} minute${minutesAgo === 1 ? '' : 's'} ago.\n\nDo you want to continue where you left off?`;
                    if (confirm(message)) {
                        isUndoRedo.current = true;
                        setSentence(data.sentence || '');
                        setTree(data.tree || null);
                        setDivisionMode(data.divisionMode ?? null);
                        setSelectedCuts(Array.isArray(data.selectedCuts) ? data.selectedCuts : []);
                        setHistory([]);
                        setHistoryIndex(-1);
                        setTimeout(() => { isUndoRedo.current = false; }, 0);
                    } else {
                        localStorage.removeItem('mak-autosave');
                        setLastSaved(null);
                    }
                } catch (err) {
                    console.error('Error restoring auto-save:', err);
                    localStorage.removeItem('mak-autosave');
                }
            }, []);

            // ===========================================
            // ATAJOS DE TECLADO
            // ===========================================
            useEffect(() => {
                const handleKeyDown = (e) => {
                    const isMac = navigator.platform.toUpperCase().indexOf('MAC') >= 0;
                    const modifier = isMac ? e.metaKey : e.ctrlKey;
                    const key = e.key.toLowerCase();
                    if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') {
                        if (modifier && key === 's') { e.preventDefault(); handleSaveJSON(); }
                        return;
                    }
                    if (modifier && key === 'z' && !e.shiftKey) { e.preventDefault(); handleUndo(); }
                    else if (modifier && key === 'z' && e.shiftKey) { e.preventDefault(); handleRedo(); }
                    else if (modifier && key === 'y') { e.preventDefault(); handleRedo(); }
                    else if (modifier && key === 's') { e.preventDefault(); handleSaveJSON(); }
                    else if (modifier && (key === '+' || key === '=')) { e.preventDefault(); zoomIn(); }
                    else if (modifier && key === '-') { e.preventDefault(); zoomOut(); }
                    else if (modifier && key === '0') { e.preventDefault(); zoomReset(); }
                };
                window.addEventListener('keydown', handleKeyDown);
                return () => window.removeEventListener('keydown', handleKeyDown);
            }, [handleUndo, handleRedo, handleSaveJSON, zoomIn, zoomOut, zoomReset]);

            // ===========================================
            // ACCIONES PRINCIPALES
            // ===========================================
            const startAnalysis = (overrideSentence) => {
                const text = overrideSentence !== undefined ? overrideSentence : sentence;
                if (text.trim()) {
                    if (overrideSentence !== undefined) setSentence(overrideSentence);
                    const newTree = createEmptyTree(text);
                    setTree(newTree);
                    setDivisionMode(null);
                    setSelectedCuts([]);
                    setHistory([JSON.stringify(newTree)]);
                    setHistoryIndex(0);
                }
            };

            const handleStartAnalysis = () => {
                if (!sentence.trim()) return;
                startAnalysis();
            };

            const handleDivide = () => {
                const node = findNodeById(tree, divisionMode);
                const words = node.text.split(/\s+/);
                const segments = [];
                let start = 0;
                const sortedCuts = [...selectedCuts].sort((a, b) => a - b);
                [...sortedCuts, words.length - 1].forEach(cut => {
                    segments.push(words.slice(start, cut + 1).join(' '));
                    start = cut + 1;
                });
                const children = segments.filter(s => s.trim()).map((s, i) => ({
                    id: `${divisionMode}-${i}-${Date.now()}`,
                    text: s,
                    labels: ['', ''],
                    children: null,
                    isNucleus: false,
                    isConsolidated: false
                }));
                setTree(prev => updateNode(prev, divisionMode, { children }));
                setDivisionMode(null);
                setSelectedCuts([]);
            };

            const toggleConsolidated = (nodeId) => {
                setTree(prev => {
                    const node = findNodeById(prev, nodeId);
                    return updateNode(prev, nodeId, { isConsolidated: !node.isConsolidated });
                });
            };

            const expandNode = (nodeId) => {
                setTree(prev => {
                    const node = findNodeById(prev, nodeId);
                    if (!node || node.children) return prev;
                    const childNode = {
                        id: `${nodeId}-child-${Date.now()}`,
                        text: node.text,
                        labels: ['', ''],
                        children: null,
                        isNucleus: node.isNucleus,
                        isConsolidated: false
                    };
                    return updateNode(prev, nodeId, { children: [childNode], isNucleus: false });
                });
            };

            const addChildNode = (parentId) => {
                setNodeTextValue(''); // Limpiamos el texto previo
                setNodeTextPending({ parentId }); // Activamos el primer modal
            };

            const handleNodeTextConfirm = () => {
                if (!nodeTextPending) return;
    
                // Si el usuario no escribe nada y da a Next, podríamos cancelarlo o permitir un nodo vacío (aquí permitimos vacío o usamos '∅')
                const txt = nodeTextValue.trim(); 
    
                const parentId = nodeTextPending.parentId;
                const parent = findNodeById(tree, parentId);
                const existing = parent?.children ? [...parent.children] : [];
                const siblings = existing.map(c => (c.text || '').trim() || '∅');

                setNodeTextPending(null); // Oculta este modal
                setPosPicker({ parentId, txt: txt, siblings, pos: 1 }); // Muestra tu modal original de posición
            };

            const confirmInsertAtPosition = () => {
                if (!posPicker) return;
                const { parentId, txt, pos } = posPicker;
                setTree(prev => {
                    const parent = findNodeById(prev, parentId);
                    const existing = parent?.children ? [...parent.children] : [];
                    let p = Math.max(1, Math.min(existing.length + 1, parseInt(pos, 10) || existing.length + 1));
                    const newNode = makeNewNode(txt);
                    existing.splice(p - 1, 0, newNode);
                    return updateNode(prev, parentId, { children: existing });
                });
                setPosPicker(null);
            };

            // ===========================================
            // LABEL MANAGEMENT (multi-row)
            // ===========================================
            const addLabelRow = (nodeId) => {
                setTree(prev => {
                    const node = findNodeById(prev, nodeId);
                    if (!node || node.labels.length >= 5) return prev;
                    return updateNode(prev, nodeId, { labels: [...node.labels, ''] });
                });
            };

            const removeLabelRow = (nodeId, labelIndex) => {
                setTree(prev => {
                    const node = findNodeById(prev, nodeId);
                    if (!node || node.labels.length <= 1) return prev;
                    const newLabels = node.labels.filter((_, i) => i !== labelIndex);
                    return updateNode(prev, nodeId, { labels: newLabels });
                });
            };

            const updateLabel = (nodeId, labelIndex, value) => {
                setTree(prev => {
                    const node = findNodeById(prev, nodeId);
                    if (!node) return prev;
                    const newLabels = [...node.labels];
                    newLabels[labelIndex] = value;
                    return updateNode(prev, nodeId, { labels: newLabels });
                });
            };

            // ===========================================
            // CARGAR ARCHIVOS
            // ===========================================
            const handleLoadJSON = (event) => {
                const file = event.target.files[0];
                if (!file) return;
                const reader = new FileReader();
                reader.onload = (e) => {
                    try {
                        const imported = JSON.parse(e.target.result);
                        if (!imported.tree || !imported.sentence) {
                            alert('Error: The file does not have the expected format.');
                            return;
                        }
                        // Migrar formato ENT si es necesario
                        const migrateNode = (node) => {
                            if (!node) return node;
                            const migrated = { ...node };
                            if (!migrated.labels) {
                                migrated.labels = [migrated.labelTop || ''];
                                delete migrated.labelTop;
                                delete migrated.labelBottom;
                            }
                            if (migrated.children) migrated.children = migrated.children.map(migrateNode);
                            return migrated;
                        };
                        const migratedTree = migrateNode(imported.tree);
                        setSentence(imported.sentence || '');
                        setTree(migratedTree);
                        setHistory([JSON.stringify(migratedTree)]);
                        setHistoryIndex(0);
                        localStorage.removeItem('mak-autosave');
                        setLastSaved(null);
                    } catch (error) {
                        alert('Error reading file.\n\nDetail: ' + error.message);
                    }
                };
                reader.readAsText(file);
                event.target.value = '';
            };

            // ===========================================
            // EXPORTACIÓN PNG
            // ===========================================
            const handleExport = async () => {
                const treeWrapper = document.querySelector('.tree-container .tree-wrapper');
                if (!treeWrapper) return;
                const treeContainer = document.querySelector('.tree-container');

                const savedZoom = zoomLevel;
                setZoomLevel(100);
                await new Promise(resolve => requestAnimationFrame(() => requestAnimationFrame(resolve)));
                await new Promise(resolve => setTimeout(resolve, 50));

                try {
                    const originalOverflow = treeContainer.style.overflow;
                    const originalWidth = treeContainer.style.width;
                    const originalMaxWidth = treeContainer.style.maxWidth;
                    treeContainer.style.overflow = 'visible';
                    treeContainer.style.width = 'fit-content';
                    treeContainer.style.maxWidth = 'none';

                    const undoBtns = treeWrapper.querySelectorAll('.btn-danger-soft');
                    const clearBtns = treeWrapper.querySelectorAll('.clear-text-btn');
                    const addBtns = treeWrapper.querySelectorAll('.add-node-btn');
                    const labelAddBtns = treeWrapper.querySelectorAll('.label-add-btn');
                    const labelRemoveBtns = treeWrapper.querySelectorAll('.label-remove-btn');
                    const editBtns = treeWrapper.querySelectorAll('.edit-text-btn');
                    const consolidateBtns = treeWrapper.querySelectorAll('.consolidate-btn');

                    undoBtns.forEach(b => b.style.visibility = 'hidden');
                    clearBtns.forEach(b => b.style.display = 'none');
                    addBtns.forEach(b => b.style.display = 'none');
                    labelAddBtns.forEach(b => b.style.display = 'none');
                    labelRemoveBtns.forEach(b => b.style.display = 'none');
                    editBtns.forEach(b => b.style.display = 'none');
                    consolidateBtns.forEach(b => b.style.display = 'none');

                    const connectors = treeWrapper.querySelectorAll('.connector-v, .v-line-stem');
                    const nodeBoxes = treeWrapper.querySelectorAll('.node-box');
                    const inputData = [];

                    const originalInlineStyles = {
                        connectors: Array.from(connectors).map(el => ({ el, cssText: el.style.cssText })),
                        nodeBoxes: Array.from(nodeBoxes).map(el => ({ el, cssText: el.style.cssText })),
                        treeWrapperPos: treeWrapper.style.position
                    };

                    // Strip node boxes: transparent bg/border/shadow
                    nodeBoxes.forEach(box => {
                        box.style.background = 'transparent';
                        box.style.backgroundColor = 'transparent';
                        box.style.border = '1px solid transparent';
                        box.style.boxShadow = 'none';
                    });

                    const getLabelValue = (element) => {
                        if (!element) return '';
                        if (element.tagName === 'INPUT') return element.value.trim();
                        const rawValue = element.getAttribute('data-raw-value');
                        return rawValue !== null ? rawValue.trim() : element.textContent.trim();
                    };

                    const nodeContainers = treeWrapper.querySelectorAll('.node-container');
                    nodeContainers.forEach(container => {
                        const labelsStack = container.querySelector(':scope > .labels-stack');
                        if (!labelsStack) return;
                        
                        const labelRows = labelsStack.querySelectorAll(':scope > .label-row');
                        let anyLabelHasValue = false;

                        labelRows.forEach(row => {
                            const labelWraps = row.querySelectorAll('.label-wrap');
                            const elements = row.querySelectorAll('.label-input, .label-display');
                            const combinedVal = Array.from(elements).map(el => getLabelValue(el)).filter(v => v && v !== 'label').join(' ');

                            const span = document.createElement('span');
                            if (!combinedVal) {
                                span.style.display = 'none';
                                row.style.display = 'none';
                            } else {
                                anyLabelHasValue = true;
                                span.className = 'exp-label';
                                span.style.cssText = `display: inline-flex; align-items: center; justify-content: center; min-width: 94px; height: var(--row-h); text-align: center; font-size: calc(11px * var(--mak-text-scale, 1)); font-family: 'Source Sans 3', sans-serif; padding: 0 calc(4px * var(--mak-text-scale, 1)); border: 1px solid transparent; border-radius: 4px; background-color: transparent; color: var(--label-text); box-sizing: border-box;`;
                                applyFormatToSpan(span, combinedVal);
                            }

                            labelWraps.forEach(lw => lw.style.display = 'none');
                            inputData.push({ type: 'label', labelWraps, span, row, parent: row });
                            row.insertBefore(span, row.firstChild);
                        });

                        if (!anyLabelHasValue) {
                            labelsStack.dataset.wasHidden = 'true';
                            labelsStack.style.display = 'none';
                        }
                    });

                    const canvas = await html2canvas(treeWrapper, {
                        backgroundColor: null,
                        scale: 2,
                        width: treeWrapper.scrollWidth,
                        height: treeWrapper.scrollHeight
                    });

                    const link = document.createElement('a');
                    link.download = getFileName('png');
                    link.href = canvas.toDataURL();
                    link.click();

                    treeContainer.style.overflow = originalOverflow;
                    treeContainer.style.width = originalWidth;
                    treeContainer.style.maxWidth = originalMaxWidth;

                    inputData.forEach(d => {
                        d.span.remove();
                        d.labelWraps.forEach(lw => lw.style.display = '');
                        if (d.row) d.row.style.display = '';
                    });

                    treeWrapper.querySelectorAll('.labels-stack[data-was-hidden]').forEach(stack => {
                        stack.style.display = '';
                        delete stack.dataset.wasHidden;
                    });

                    originalInlineStyles.connectors.forEach(({ el, cssText }) => { el.style.cssText = cssText; });
                    originalInlineStyles.nodeBoxes.forEach(({ el, cssText }) => { el.style.cssText = cssText; });

                    undoBtns.forEach(b => b.style.visibility = 'visible');
                    clearBtns.forEach(b => b.style.display = '');
                    addBtns.forEach(b => b.style.display = '');
                    labelAddBtns.forEach(b => b.style.display = '');
                    labelRemoveBtns.forEach(b => b.style.display = '');
                    editBtns.forEach(b => b.style.display = '');
                    consolidateBtns.forEach(b => b.style.display = '');

                } finally {
                    setZoomLevel(savedZoom);
                }
            };

            // ===========================================
            // RENDERIZADO DE ETIQUETAS (MULTI-FILA)
            // ===========================================
            const renderSingleLabel = (node, labelIndex) => {
                const value = node.labels[labelIndex] || '';
                const hasValue = value.trim() !== '';
                const labelKey = `${node.id}-label-${labelIndex}`;
                const isEditing = editingLabel === labelKey;
                const baseClass = `label-input ${hasValue ? 'has-value' : ''}`;

                const setValue = (newVal) => updateLabel(node.id, labelIndex, newVal);
                const startEditing = () => setEditingLabel(labelKey);
                
                const handleBlur = () => {
                    setTimeout(() => {
                        setEditingLabel(prev => prev === labelKey ? null : prev);
                    }, 200);
                };

                // Nueva lógica para Enter, Tab y Shift+Tab
                const handleKeyDown = (e) => {
