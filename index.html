                    if (e.key === 'Enter') { 
                        e.preventDefault(); 
                        setEditingLabel(null); 
                    } else if (e.key === 'Tab') {
                        e.preventDefault(); // Evita el comportamiento por defecto del navegador
                        
                        // 1. Aplanamos el árbol para conocer el orden lógico (de izquierda a derecha)
                        const flatNodes = [];
                        const flatten = (n) => {
                            if (!n) return;
                            flatNodes.push(n);
                            if (n.children) n.children.forEach(flatten);
                        };
                        flatten(tree);
                        
                        const currentNodeIdx = flatNodes.findIndex(n => n.id === node.id);
                        
                        if (e.shiftKey) {
                            // NAVEGACIÓN HACIA ATRÁS (Shift + Tab)
                            if (labelIndex > 0) {
                                // Subir a la etiqueta anterior del mismo nodo
                                setEditingLabel(`${node.id}-label-${labelIndex - 1}`);
                            } else if (currentNodeIdx > 0) {
                                // Ir a la última etiqueta del nodo anterior
                                const prevNode = flatNodes[currentNodeIdx - 1];
                                setEditingLabel(`${prevNode.id}-label-${prevNode.labels.length - 1}`);
                            }
                        } else {
                            // NAVEGACIÓN HACIA ADELANTE (Tab)
                            if (labelIndex + 1 < node.labels.length) {
                                // Bajar a la siguiente etiqueta del mismo nodo
                                setEditingLabel(`${node.id}-label-${labelIndex + 1}`);
                            } else if (currentNodeIdx + 1 < flatNodes.length) {
                                // Ir a la primera etiqueta del nodo siguiente a la derecha
                                const nextNode = flatNodes[currentNodeIdx + 1];
                                setEditingLabel(`${nextNode.id}-label-0`);
                            } else {
                                // Si es el último nodo y la última etiqueta, salimos de la edición
                                setEditingLabel(null);
                            }
                        }
                    }
                };

                const hasPills = userLabels.length > 0;
                const filteredPills = hasPills
                    ? userLabels.filter(l => l.toLowerCase().includes(value.toLowerCase()))
                    : [];

                if (isEditing) {
                    return (
                        <div className="label-wrap" style={{ position: 'relative' }}>
                            <input 
                                type="text" 
                                value={value} 
                                onChange={(e) => { setValue(e.target.value); }}
                                onBlur={handleBlur} 
                                onKeyDown={(e) => {
                                    if (e.key === 'Escape' && labelDropdown) {
                                        setLabelDropdown(null);
                                        e.stopPropagation();
                                        return;
                                    }
                                    handleKeyDown(e);
                                }}
                                onFocus={(e) => {
                                    if (hasPills) {
                                        const rect = e.target.getBoundingClientRect();
                                        setLabelDropdown({ key: labelKey, x: rect.left + rect.width / 2, y: rect.bottom + 6 });
                                    }
                                }}
                                autoFocus 
                                className={baseClass} 
                                style={{ width: '94px' }} 
                                placeholder="label" 
                            />
                            {labelDropdown && labelDropdown.key === labelKey && hasPills && filteredPills.length > 0 && (
                                <div
                                    ref={labelDropdownRef}
                                    className="label-dropdown"
                                    style={{ top: labelDropdown.y, left: labelDropdown.x, transform: 'translateX(-50%)' }}
                                    onMouseDown={(e) => e.preventDefault()}
                                >
                                    <span className="label-dropdown-clear" onMouseDown={() => { setValue(''); setLabelDropdown(null); }}>clear label</span>
                                    <div className="label-dropdown-pills">
                                        {filteredPills.map(lbl => (
                                            <span key={lbl} className="label-pill" onMouseDown={() => { setValue(lbl); setLabelDropdown(null); setEditingLabel(null); }}>
                                                {lbl}
                                            </span>
                                        ))}
                                    </div>
                                </div>
                            )}
                        </div>
                    );
                }

                const displayClass = `label-display ${hasValue ? 'has-value' : ''}`;
                return (
                    <div className="label-wrap" style={{ position: 'relative' }}>
                        <span 
                            className={displayClass} 
                            style={{ width: '94px', minWidth: '94px', maxWidth: '94px' }} 
                            onClick={(e) => {
                                startEditing();
                                if (hasPills) {
                                    const rect = e.currentTarget.getBoundingClientRect();
                                    setLabelDropdown({ key: labelKey, x: rect.left + rect.width / 2, y: rect.bottom + 6 });
                                }
                            }}
                            data-raw-value={value || ''}
                        >
                            <span className="node-text-ellipsis" title={hasValue ? value : ''}>
                                {hasValue ? formatLabelText(value) : <span style={{color: '#9ca3af'}}>label</span>}
                            </span>
                        </span>
                    </div>
                );
            };

            const renderLabelsStack = (node) => {
                const labels = node.labels || [''];
                return (
                    <div className="labels-stack">
                        {labels.map((label, idx) => (
                            <React.Fragment key={idx}>
                                {idx > 0 && <div className="label-connector-v" />}
                                <div className="label-row">
                                    {renderSingleLabel(node, idx)}
                                    {labels.length > 1 && (
                                        <button className="label-remove-btn" onClick={(e) => { e.stopPropagation(); removeLabelRow(node.id, idx); }} title="Remove this label row">×</button>
                                    )}
                                </div>
                            </React.Fragment>
                        ))}
                        {labels.length < 5 && (
                            <button className="label-add-btn" onClick={(e) => { e.stopPropagation(); addLabelRow(node.id); }} title="Add label row">+</button>
                        )}
                    </div>
                );
            };

            // ===========================================
            // RENDERIZADO DE NODOS
            // ===========================================
            // ===========================================
            // RENDERIZADO DE NODOS
            // ===========================================
            const renderNode = (node) => {
                const isRoot = node.id === 'root';
                const isDiv = divisionMode === node.id;
                const hasC = node.children && node.children.length > 0;
                const isEmpty = !node.text || node.text.trim() === '';
                const words = node.text ? node.text.split(/\s+/) : [];
                const canDivide = words.length > 1 && !node.isInserted && !node.isConsolidated;
                const canConsolidate = words.length > 1 && !node.isInserted && !hasC;
                const isTerminal = !hasC;
                const isSingleWordTerminal = isTerminal && words.length === 1;
                const isWhiteTerminal = isTerminal && (words.length === 1 || node.isConsolidated);
                const isEditingText = editingNode === node.id;
                const isSplitPoint = isEmpty && hasC && !isRoot;

                if (isSplitPoint) {
                    return (
                        <div className="node-container" key={node.id}>
                            {renderLabelsStack(node)}
                            <div style={{display:'flex', flexDirection:'column', alignItems:'center', width:'100%'}}>
                                <div className="connector-v" style={{height:'calc(var(--row-h) / 2)'}} />
                                <div className="children-container">
                                    {node.children.map((c) => (
                                        <div className="child-branch" key={c.id}>
                                            <div className="v-line-stem" />
                                            {renderNode(c)}
                                        </div>
                                    ))}
                                </div>
                            </div>
                        </div>
                    );
                }

                return (
                    <div className="node-container" key={node.id}>
                        {!isRoot && renderLabelsStack(node)}

                        {isEmpty ? (
                            isRoot ? null : <div className="connector-v" style={{ height: 'var(--row-h)' }} />
                        ) : (
                            <>
                                {!isRoot && <div className="connector-v" style={{ height: 'var(--row-h)' }} />}

                                {isDiv ? (
                                    <div style={{background:'#f8fafc', padding:'15px', border:'1px solid #374151', borderRadius:'4px'}}>
                                        <div style={{display:'flex', gap:'4px', marginBottom:'10px'}}>
                                            {words.map((w, i) => (
                                                <React.Fragment key={i}>
                                                    <span style={{padding:'6px 10px', background:'white', border:'1px solid #cbd5e1'}}>{w}</span>
                                                    {i < words.length - 1 && (
                                                        <button
                                                            onClick={() => setSelectedCuts(prev => prev.includes(i) ? prev.filter(x => x !== i) : [...prev, i].sort((a,b) => a-b))}
                                                            style={{width:'10px', background: selectedCuts.includes(i) ? '#000000' : '#e2e8f0', border:'none', cursor:'pointer'}}
                                                        />
                                                    )}
                                                </React.Fragment>
                                            ))}
                                        </div>
                                        <div style={{display:'flex', gap:'8px', justifyContent:'center'}}>
                                            <button onClick={handleDivide} className="btn btn-primary" style={{padding:'5px 12px'}}>Divide</button>
                                            <button onClick={() => setDivisionMode(null)} className="btn btn-outline" style={{padding:'5px 12px'}}>Cancel</button>
                                        </div>
                                    </div>
                                ) : (
                                    <div className="node-box-row">
                                        <div className={`node-box ${isRoot ? 'root-node' : ''} ${isWhiteTerminal ? 'terminal-node' : ''} ${(canDivide && !isEditingText) ? 'can-divide' : ''}`} onClick={() => !hasC && canDivide && !isEditingText && setDivisionMode(node.id)}>
                                            {isEditingText ? (
                                                <input
                                                    type="text"
                                                    value={node.text}
                                                    onChange={(e) => setTree(prev => updateNode(prev, node.id, { text: e.target.value }))}
                                                    onBlur={() => setEditingNode(null)}
                                                    onKeyDown={(e) => { if (e.key === 'Enter') setEditingNode(null); }}
                                                    autoFocus
                                                    style={{
                                                        textAlign: 'center', border: '1px dashed var(--accent)', borderRadius: '4px',
                                                        padding: '2px 4px', fontFamily: 'inherit', fontStyle: 'italic', fontSize: 'calc(11px * var(--mak-text-scale, 1))', color: 'var(--ink)',
                                                        background: 'var(--cream)', outline: 'none', width: isRoot ? `${Math.max(node.text?.length || 1, 3)}ch` : 'calc(100% - 8px)', minWidth: isRoot ? '40px' : '0', maxWidth: isRoot ? 'none' : 'calc(100% - 8px)'
                                                    }}
                                                    onClick={(e) => e.stopPropagation()}
                                                />
                                            ) : (
                                                isRoot ? (
                                                    node.text
                                                ) : (
                                                    <span className="node-text-ellipsis" title={node.text}>{node.text}</span>
                                                )
                                            )}

                                            {canConsolidate && !isEditingText && (
                                                <button className="consolidate-btn" title={node.isConsolidated ? "Allow division" : "Consolidate"} onClick={(e) => { e.stopPropagation(); toggleConsolidated(node.id); }}>
                                                    {node.isConsolidated ? '÷' : '∪'}
                                                </button>
                                            )}
                                            {hasC && !node.isInserted && !isEditingText && (
                                                <button 
                                                    className="add-node-btn" 
                                                    title="Add child node" 
                                                    onClick={(e) => { e.stopPropagation(); addChildNode(node.id); }}
                                                >
                                                    +<span style={{ fontSize: '0.7em', marginLeft: '1px', transform: 'translateY(1px)' }}>1</span>
                                                </button>
                                            )}
                                            {!isEditingText && canDivide && (
                                                <button className="clear-text-btn" title="Clear text" onClick={(e) => { e.stopPropagation(); setTree(prev => updateNode(prev, node.id, { text: '' })); }}>✕</button>
                                            )}
                                            {!isEditingText && (
                                                <button className="edit-text-btn" title="Edit text" onClick={(e) => { e.stopPropagation(); setEditingNode(node.id); }}>✎</button>
                                            )}
                                        </div>
                                        {hasC && (
                                            <button className="btn-danger-soft node-revert-btn" onClick={(e) => { e.stopPropagation(); setTree(prev => updateNode(prev, node.id, { children: null })); }} title="Undo division">↩</button>
                                        )}
                                    </div>
                                )}

                            </>
                        )}

                        {/* Lower labels: root node only */}
                        {isRoot && (
                            <>
                                {!isEmpty && <div className="connector-v" style={{height:'var(--row-h)'}} />}
                                {renderLabelsStack(node)}
                            </>
                        )}

                        {hasC && (
                            <div style={{display:'flex', flexDirection:'column', alignItems:'center', width:'100%'}}>
                                <div className="connector-v" style={{height:'calc(var(--row-h) / 2)'}} />
                                <div className="children-container">
                                    {node.children.map((c) => (
                                        <div className="child-branch" key={c.id}>
                                            <div className="v-line-stem" />
                                            {renderNode(c)}
                                        </div>
                                    ))}
                                </div>
                            </div>
                        )}
                    </div>
                );
            };

            // ===========================================
            // MAIN VIEW — PANEL + CANVAS LAYOUT
            // ===========================================
            const [guideOpen, setGuideOpen] = useState(false);
            const [showNewDiagram, setShowNewDiagram] = useState(false);
            const [newDiagramText, setNewDiagramText] = useState('');
            
            // Estados y referencias para el panel IPA
            const [showIPA, setShowIPA] = useState(false);
            const newDiagramInputRef = useRef(null);

            const insertIPAChar = (char) => {
                const input = newDiagramInputRef.current;
                if (!input) return;
                const start = input.selectionStart;
                const end = input.selectionEnd;
                const newVal = newDiagramText.substring(0, start) + char + newDiagramText.substring(end);
                setNewDiagramText(newVal);
                // Retornar el foco al input después de insertar el caracter
                setTimeout(() => {
                    input.focus();
                    const pos = start + char.length;
                    input.setSelectionRange(pos, pos);
                }, 0);
            };

            const handleNewDiagram = () => {
                setNewDiagramText('');
                setShowIPA(false);
                setCliticPending(null);
                setContractionPending(null);
                setShowNewDiagram(true);
            };

            // --- Helper: proceed after clitics are resolved (check for English contractions next) ---
            const proceedAfterClitics = (text) => {
                const contractions = detectAmbiguousContractions(text);
                if (contractions.length > 0) {
                    setContractionPending({ text, candidates: contractions });
                } else {
                    finalizeAndStart(text);
                }
            };

            // --- Helper: finalize and start analysis ---
            const finalizeAndStart = (text) => {
                setSentence(text);
                setShowNewDiagram(false);
                setNewDiagramText('');
                setCliticPending(null);
                setContractionPending(null);
                startAnalysis(text);
            };

            const handleNewDiagramConfirm = () => {
                if (!newDiagramText.trim()) return;
                const text = newDiagramText.trim();
                // Step 1: check Spanish clitics
                const clitics = detectCliticCandidates(text);
                if (clitics.length > 0) {
                    setCliticPending({ text, candidates: clitics });
                } else {
                    // No clitics — check English contractions
                    proceedAfterClitics(text);
                }
            };

            // --- Clitic modal handlers ---
            const handleCliticConfirm = () => {
                if (!cliticPending) return;
                const textAfterClitics = applyCliticSeparations(cliticPending.text, cliticPending.candidates);
                setCliticPending(null);
                proceedAfterClitics(textAfterClitics);
            };

            const handleCliticBack = () => {
                setCliticPending(null);
            };

            const toggleCliticCandidate = (idx) => {
                setCliticPending(prev => {
                    if (!prev) return prev;
                    const updated = prev.candidates.map((c, i) =>
                        i === idx ? { ...c, checked: !c.checked } : c
                    );
                    return { ...prev, candidates: updated };
                });
            };

            // --- Contraction modal handlers ---
            const handleContractionConfirm = () => {
                if (!contractionPending) return;
                const finalText = applyContractionExpansions(contractionPending.text, contractionPending.candidates);
                finalizeAndStart(finalText);
            };

            const handleContractionSkip = () => {
                if (!contractionPending) return;
                finalizeAndStart(contractionPending.text);
            };

            const handleContractionBack = () => {
                setContractionPending(null);
                // Go back: if there were clitics originally, re-show them? 
                // Simpler: just go back to input step
            };

            const updateContractionExpansion = (idx, value) => {
                setContractionPending(prev => {
                    if (!prev) return prev;
                    const updated = prev.candidates.map((c, i) =>
                        i === idx ? { ...c, expansion: value } : c
                    );
                    return { ...prev, candidates: updated };
                });
            };

            return (
                <div className="app-layout">
                    {/* LEFT PANEL */}
                    <div className="side-panel">
                        {/* LOGO */}
                        <div style={{ textAlign: 'center', paddingBottom: '12px', borderBottom: '1px solid var(--rule)' }}>
                            <img src="mak.png" alt="M.A.K. Logo" style={{ maxWidth: '100%', height: 'auto', display: 'block', margin: '0 auto' }} />
                        </div>

                        {/* NEW DIAGRAM */}
                        <div>
                            <button className="panel-btn primary" onClick={handleNewDiagram} style={{width:'100%'}}>
                                <span className="panel-tool-icon">
                                    <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="m12 3-1.912 5.813a2 2 0 0 1-1.275 1.275L3 12l5.813 1.912a2 2 0 0 1 1.275 1.275L12 21l1.912-5.813a2 2 0 0 1 1.275-1.275L21 12l-5.813-1.912a2 2 0 0 1-1.275-1.275L12 3Z"></path><path d="M5 3v4"></path><path d="M19 17v4"></path><path d="M3 5h4"></path><path d="M17 19h4"></path></svg>
                                </span> 
                                New Diagram
                            </button>
                            <button className="panel-btn" onClick={() => window.open('manual.html', '_blank')} style={{width:'100%', marginTop: '6px'}}>
                                <span className="panel-tool-icon">
                                    <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M4 19.5v-15A2.5 2.5 0 0 1 6.5 2H20v20H6.5a2.5 2.5 0 0 1 0-5H20"></path></svg>
                                </span>
                                Manual
                            </button>
                        </div>

                        {/* FILES */}
                        <div>
                            <div className="panel-section-title">Files</div>
                            <div className="panel-tools">
                                <button className="panel-tool-btn" onClick={handleSaveJSON} disabled={!tree}>
                                    <span className="panel-tool-icon"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="7 10 12 15 17 10"></polyline><line x1="12" y1="15" x2="12" y2="3"></line></svg></span> Save Project
                                </button>
                                <button className="panel-tool-btn" onClick={() => fileInputRef.current.click()}>
                                    <span className="panel-tool-icon"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="17 8 12 3 7 8"></polyline><line x1="12" y1="3" x2="12" y2="15"></line></svg></span> Load Project
                                </button>
                                <button className="panel-tool-btn" onClick={handleExport} disabled={!tree}>
                                    <span className="panel-tool-icon"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect><circle cx="8.5" cy="8.5" r="1.5"></circle><polyline points="21 15 16 10 5 21"></polyline></svg></span> Download as Image
                                </button>
                            </div>
                        </div>

                        {/* LABELS */}
                        <div>
                            <div className="panel-section-title">Labels</div>
                            <div className="panel-tools">
                                <button className="panel-tool-btn" onClick={openLabelsModal}>
                                    <span className="panel-tool-icon">
                                        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M20.59 13.41l-7.17 7.17a2 2 0 0 1-2.83 0L2 12V2h10l8.59 8.59a2 2 0 0 1 0 2.82z"></path><line x1="7" y1="7" x2="7.01" y2="7"></line></svg>
                                    </span>
                                    {userLabels.length > 0 ? `Labels (${userLabels.length})` : 'Set Up Labels'}
                                </button>
                            </div>
                        </div>

                        {/* HISTORY */}
                        <div>
                            <div className="panel-section-title">History</div>
                            <div className="panel-tools">
                                <button className="panel-tool-btn" onClick={handleUndo} disabled={!canUndo}>
                                    <span className="panel-tool-icon"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M3 7v6h6"></path><path d="M21 17a9 9 0 0 0-9-9 9 9 0 0 0-6 2.3L3 13"></path></svg></span> Undo
                                </button>
                                <button className="panel-tool-btn" onClick={handleRedo} disabled={!canRedo}>
                                    <span className="panel-tool-icon"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21 7v6h-6"></path><path d="M3 17a9 9 0 0 1 9-9 9 9 0 0 1 6 2.3l3 3.7"></path></svg></span> Redo
                                </button>
                            </div>
                        </div>
                        
                        {/* ZOOM */}
                        <div>
                            <div className="panel-section-title">Zoom</div>
                            <div className="panel-zoom-controls">
                                <button className="zoom-btn" onClick={zoomOut} disabled={zoomLevel <= ZOOM_MIN} title="Zoom out">−</button>
                                <div className="zoom-indicator" onClick={zoomReset} title="Reset zoom">{zoomLevel}%</div>
                                <button className="zoom-btn" onClick={zoomIn} disabled={zoomLevel >= ZOOM_MAX} title="Zoom in">+</button>
                            </div>
                        </div>

                        {/* QUICK GUIDE */}
                        <div>
                            <button 
                                className={`panel-guide-toggle ${guideOpen ? 'open-style' : ''}`} 
                                onClick={() => setGuideOpen(!guideOpen)}
                            >
                                <span className="panel-tool-icon">
                                    <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"></circle><path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"></path><line x1="12" y1="17" x2="12.01" y2="17"></line></svg>
                                </span>
                                Quick Guide {guideOpen ? '▾' : '▸'}
                            </button>
                            <div className={`panel-guide-content ${guideOpen ? 'open' : ''}`}>
                                <div className="panel-guide-inner">
                                    <div className="guide-section">
                                        <div className="guide-section-title">Constituents & Nodes</div>
                                        <ul>
                                            <li>Click on a node to enter <strong>division mode</strong>. Click the spaces between words to mark your exact cuts, then press "Divide".</li>
                                            <li>Click <code>✎</code> (bottom right) to edit the text of any node directly.</li>
                                            <li>Click <code>∪</code> (top left) to consolidate a node (preventing further division) and <code>÷</code> to allow it again.</li>
                                            <li>Click <code>+₁</code> (bottom center) to manually add an extra child node.</li>
                                            <li>Click <code>↩</code> (right side) to undo a division, and <code>✕</code> (top right) to clear a node's text.</li>
                                        </ul>
                                    </div>
                                    <div className="guide-section">
                                        <div className="guide-section-title">Labels</div>
                                        <ul>
                                            <li>The root node displays its labels <strong>below</strong> the text, while all child nodes display them <strong>above</strong>.</li>
                                            <li>Hover over a label stack and click <code>+</code> to add up to 5 rows for simultaneous analysis.</li>
                                            <li>Click the <code>×</code> button next to any row to remove it.</li>
                                            <li>Press <code>Tab</code> while editing to move to the next label or the next constituent. Use <code>Shift + Tab</code> to go back.</li>
                                            <li>Use <strong>Labels</strong> in the panel to set up a catalogue of quick-select tags available when editing any label.</li>
                                        </ul>
                                    </div>
                                    <div className="guide-section">
                                        <div className="guide-section-title">Text Formatting</div>
                                        <ul>
                                            <li><code>**text**</code> for <strong>bold</strong></li>
                                            <li><code>*text*</code> for <em>italic</em></li>
                                            <li><code>_text_</code> for <sub>subscript</sub></li>
                                            <li style={{ marginBottom: '10px' }}><code>__text__</code> for <sup>superscript</sup></li>
                                        </ul>
                                    </div>
                                </div>
                            </div>
                        </div>

                        <div className="panel-spacer"></div>

                        {(isSaving || lastSaved) && (
                            <div className="panel-autosave">
                                <span className={`panel-autosave-dot ${isSaving ? 'saving' : ''}`}></span>
                                {isSaving ? (
                                    <>Saving<span className="autosave-ellipsis"><span>.</span><span>.</span><span>.</span></span></>
                                ) : (lastSaved ? `Saved ${formatTimeAgo(lastSaved)}` : '')}
                            </div>
                        )}

                        {/* INPUT FILE OCULTO (Necesario para el Load) */}
                        <input type="file" ref={fileInputRef} style={{display:'none'}} accept=".mak,.ent,.json,application/json,text/plain,*/*" onChange={handleLoadJSON} />

                        <footer className="footer">
                            <p>Carlos González Vergara<br/>(<strong><a href="mailto:cgonzalv@uc.cl">cgonzalv@uc.cl</a></strong>)</p>
                            <a href="https://creativecommons.org/licenses/by-nc-nd/4.0/" target="_blank" rel="noopener noreferrer">
                                <img src="https://mirrors.creativecommons.org/presskit/buttons/88x31/svg/by-nc-nd.svg" alt="CC BY-NC-ND 4.0" />
                            </a>
                        </footer>
                    </div>

                    {/* CANVAS */}
                    <div className="canvas-area">
                        <div className="tree-container" ref={treeContainerRef}>
                            {tree ? (
                                <div className="zoom-container" ref={zoomContainerRef} style={{ zoom: zoomLevel / 100, '--mak-text-scale': textScale }}>
                                    <div className="tree-wrapper">{renderNode(tree)}</div>
                                </div>
                            ) : (
                                <div className="canvas-placeholder">
                                    <p>Press <strong>✦ New Diagram</strong> to begin</p>
                                </div>
                            )}
                        </div>
                    </div>

                    {/* NEW DIAGRAM MODAL */}
                    {showNewDiagram && (
                        <div className="pos-overlay" onClick={() => { setShowNewDiagram(false); setCliticPending(null); setContractionPending(null); }}>
                            <div className="new-diagram-modal" onClick={(e) => e.stopPropagation()}>

                                {/* STEP 1: Input */}
                                {!cliticPending && !contractionPending && (<>
                                <h4 className="new-diagram-title">New Diagram</h4>
                                <p className="new-diagram-sub">Type the expression you want to analyse.</p>
                                
                                <div style={{ display: 'flex', gap: '8px', marginBottom: showIPA ? '8px' : '14px' }}>
                                    <input
                                        ref={newDiagramInputRef}
                                        className="new-diagram-input"
                                        style={{ marginBottom: 0 }}
                                        type="text"
                                        value={newDiagramText}
                                        onChange={(e) => setNewDiagramText(e.target.value)}
                                        onKeyPress={(e) => e.key === 'Enter' && handleNewDiagramConfirm()}
                                        placeholder="e.g. The cat sat on the mat"
                                        autoFocus
                                    />
                                    <button 
                                        type="button" 
                                        className={`ipa-toggle-btn ${showIPA ? 'active' : ''}`} 
                                        onClick={() => setShowIPA(prev => !prev)} 
                                        title="IPA character picker"
                                    >
                                        <span style={{fontSize: '14px', lineHeight: 1}}>t͡ʃ</span> IPA
                                    </button>
                                </div>

                                {showIPA && (
                                    <div className="ipa-panel">
                                        {IPA_CATEGORIES.map((cat) => (
                                            <div key={cat.title}>
                                                <div className="ipa-category-title">{cat.title}</div>
                                                <div className="ipa-grid">
                                                    {cat.chars.map((ch, j) => (
                                                        <button key={j} type="button" className="ipa-char-btn" onClick={() => insertIPAChar(ch)} title={ch}>{ch}</button>
                                                    ))}
                                                </div>
                                            </div>
                                        ))}
                                    </div>
                                )}

                                <div className="new-diagram-actions">
                                    <button className="btn btn-outline" onClick={() => setShowNewDiagram(false)}>Cancel</button>
                                    <button className="btn btn-primary" onClick={handleNewDiagramConfirm} disabled={!newDiagramText.trim()}>Analyse</button>
                                </div>
                                </>)}

                                {/* STEP 2: Spanish clitic suggestions */}
                                {cliticPending && !contractionPending && (<>
                                <h4 className="new-diagram-title">Separate clitics?</h4>
                                <p className="new-diagram-sub">The following words may contain enclitic pronouns. Check the ones you want to separate into independent grammatical words.</p>

                                <ul className="clitic-list">
                                    {cliticPending.candidates.map((c, i) => (
                                        <li key={i} className="clitic-item">
                                            <input
                                                type="checkbox"
                                                checked={c.checked}
                                                onChange={() => toggleCliticCandidate(i)}
                                            />
                                            <span className="clitic-original">{c.original}</span>
                                            <span className="clitic-arrow">→</span>
                                            <span className="clitic-suggestion">{c.suggestion}</span>
                                        </li>
                                    ))}
                                </ul>

                                <div className="new-diagram-actions">
                                    <button className="btn btn-outline" onClick={handleCliticBack}>Back</button>
                                    <button className="btn btn-primary" onClick={handleCliticConfirm}>Confirm</button>
                                </div>
                                </>)}

                                {/* STEP 3: English contraction disambiguation */}
                                {contractionPending && (<>
                                <h4 className="new-diagram-title">Ambiguous contractions</h4>
                                <p className="new-diagram-sub">The following contractions can be interpreted in more than one way. Please select the correct expansion for each.</p>

                                <div className="clitic-list">
                                    {contractionPending.candidates.map((c, idx) => (
                                        <div key={idx} className="clitic-item">
                                            <span className="contraction-original">{c.original}</span>
                                            <span className="clitic-arrow">→</span>
                                            <select
                                                className="contraction-select"
                                                value={c.expansion}
                                                onChange={(e) => updateContractionExpansion(idx, e.target.value)}
                                            >
                                                {c.options.map(opt => (
                                                    <option key={opt.value} value={opt.value}>{opt.label}</option>
                                                ))}
                                            </select>
                                        </div>
                                    ))}
                                </div>

                                <div className="new-diagram-actions">
                                    <button className="btn btn-outline" onClick={handleContractionSkip}>Skip</button>
                                    <button className="btn btn-primary" onClick={handleContractionConfirm}>Apply and analyse</button>
                                </div>
                                </>)}

                            </div>
                        </div>
                    )}

                    {/* TEXT PICKER FOR NEW NODE */}
                    {nodeTextPending && (
                        <div className="pos-overlay" onClick={() => setNodeTextPending(null)}>
                            <div className="pos-modal" onClick={(e) => e.stopPropagation()}>
                                <h4 className="pos-title">New Child Node</h4>
                                <p className="pos-sub">Enter the text for the extra node.</p>
            
                                <div style={{ marginBottom: '14px' }}>
                                    <input
                                        type="text"
                                        className="new-diagram-input"
                                        value={nodeTextValue}
                                        onChange={(e) => setNodeTextValue(e.target.value)}
                                        onKeyDown={(e) => {
                                            if (e.key === 'Enter') handleNodeTextConfirm();
                                            if (e.key === 'Escape') setNodeTextPending(null);
                                        }}
                                        autoFocus
                                        placeholder="e.g. 1SG"
                                    />
                                </div>
            
                                <div className="pos-actions">
                                    <button className="btn btn-outline" onClick={() => setNodeTextPending(null)}>Cancel</button>
                                    <button className="btn btn-primary" onClick={handleNodeTextConfirm}>Next</button>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* POSITION PICKER */}
                    {posPicker && (
                        <div className="pos-overlay" onClick={() => setPosPicker(null)}>
                            <div className="pos-modal" onClick={(e) => e.stopPropagation()}>
                                <h4 className="pos-title">Where should the new constituent go?</h4>
                                <p className="pos-sub">Choose the position to insert it among the current constituents.</p>
                                <div className="pos-row">
                                    <select className="pos-select" value={posPicker.pos} onChange={(e) => setPosPicker(pp => ({ ...pp, pos: parseInt(e.target.value, 10) }))}>
                                        {Array.from({ length: posPicker.siblings.length + 1 }, (_, idx) => {
                                            const i = idx + 1;
                                            return <option key={i} value={i}>{buildPosLabel(i, posPicker.siblings)}</option>;
                                        })}
                                    </select>
                                </div>
                                <div className="pos-actions">
                                    <button className="btn btn-outline" onClick={() => setPosPicker(null)}>Cancel</button>
                                    <button className="btn btn-primary" onClick={confirmInsertAtPosition}>Insert</button>
                                </div>
                            </div>
                        </div>
                    )}
                    {/* LABELS MODAL */}
                    {showLabelsModal && (
                        <div className="labels-modal-overlay" onClick={() => setShowLabelsModal(false)}>
                            <div className="labels-modal" onClick={(e) => e.stopPropagation()}>
                                <h4 className="labels-modal-title">Label Catalogue</h4>
                                <p className="labels-modal-sub">
                                    Enter your labels separated by commas or line breaks. They will appear as quick-select options when you edit any label in the diagram.
                                </p>

                                <textarea
                                    className="labels-modal-textarea"
                                    value={labelsTextDraft}
                                    onChange={(e) => setLabelsTextDraft(e.target.value)}
                                    placeholder="e.g. NG, NV, Adj, Adv, Prep, Conj, S, P, O, C"
                                    autoFocus
                                />

                                {/* Preview */}
                                <div className="labels-modal-preview">
                                    {parseLabels(labelsTextDraft).length === 0
                                        ? <span className="labels-modal-preview-empty">Preview will appear here…</span>
                                        : parseLabels(labelsTextDraft).map((lbl, i) => (
                                            <span key={i} className="label-pill">{lbl}</span>
                                        ))
                                    }
                                </div>

                                {/* Main actions — directly below preview */}
                                <div className="labels-modal-actions">
                                    <div style={{ display: 'flex', gap: '8px', alignItems: 'center' }}>
                                        {userLabels.length > 0 && (
                                            <button className="btn btn-outline" style={{ fontSize: '12px', padding: '6px 10px' }} onClick={clearLabels}>
                                                Clear all
                                            </button>
                                        )}
                                    </div>
                                    <div style={{ display: 'flex', gap: '8px' }}>
                                        <button className="btn btn-outline" onClick={() => setShowLabelsModal(false)}>Cancel</button>
                                        <button className="btn btn-primary" onClick={confirmLabels}>Save</button>
                                    </div>
                                </div>

                                {/* Persistence note + file actions */}
                                <div style={{ borderTop: '1px solid var(--rule-light)', paddingTop: '12px', display: 'flex', flexDirection: 'column', gap: '8px' }}>
                                    <p style={{ fontSize: '12px', color: 'var(--ink-muted)', margin: '0', lineHeight: '1.5' }}>
                                        Your catalogue is kept automatically between sessions. Use the buttons below to save it as a file or load a previously saved one.
                                    </p>
                                    <div style={{ display: 'flex', gap: '8px' }}>
                                        <button
                                            className="btn btn-outline"
                                            style={{ flex: 1, fontSize: '12px', padding: '7px 10px', justifyContent: 'center' }}
                                            onClick={saveLabelsToFile}
                                            disabled={parseLabels(labelsTextDraft).length === 0}
                                            title="Download catalogue as a .txt file"
                                        >
                                            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M13 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V9z"></path><polyline points="13 2 13 9 20 9"></polyline><line x1="12" y1="12" x2="12" y2="18"></line><polyline points="9 15 12 18 15 15"></polyline></svg>
                                            Save to file
                                        </button>
                                        <button
                                            className="btn btn-outline"
                                            style={{ flex: 1, fontSize: '12px', padding: '7px 10px', justifyContent: 'center' }}
                                            onClick={() => labelsFileInputRef.current.click()}
                                            title="Load catalogue from a .txt file"
                                        >
                                            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M13 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V9z"></path><polyline points="13 2 13 9 20 9"></polyline><line x1="12" y1="18" x2="12" y2="12"></line><polyline points="9 15 12 12 15 15"></polyline></svg>
                                            Load from file
                                        </button>
                                        <input type="file" ref={labelsFileInputRef} style={{display:'none'}} accept=".txt,text/plain" onChange={handleLoadLabelsFromPanel} />
                                    </div>
                                </div>
                            </div>
                        </div>
                    )}

                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById("root"));
        root.render(<SyntaxTreeBuilder />);
    </script>
</body>
</html>
